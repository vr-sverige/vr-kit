<article class="article" [class.article--transparent]="display === 'transparent'"
	[class.article--white]="display === 'white'" [class.article--sheet]="display === 'sheet'">
	<header class="article__header" *ngIf="title">
		<h2>{{title}}</h2>
		<ng-content class="article__header-action" select="[action]"></ng-content>
	</header>
	<ng-content></ng-content>
</article>
